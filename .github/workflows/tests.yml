# ============================================================================
# LARAVEL NATS - TEST WORKFLOW
# ============================================================================
#
# Runs the full test suite against the PHP/Laravel version matrix.
# Integration tests use a real NATS server running in Docker.
#
# Matrix:
# - PHP 8.2, 8.3, 8.4, 8.5 (minimum PHP 8.2 for Pest/PHPUnit compatibility)
# - Laravel 10, 11, 12, 13 (Laravel 13 requires PHP 8.3+)
# ============================================================================

name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 - PHP 8.2
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
            stability: prefer-stable
          
          # Laravel 11 - PHP 8.2 (minimum for L11)
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
            stability: prefer-stable
          
          # Laravel 11 - PHP 8.3
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            stability: prefer-stable
          
          # Laravel 12 - PHP 8.2
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            stability: prefer-stable
          
          # Laravel 12 - PHP 8.3
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            stability: prefer-stable

          # Laravel 10 - PHP 8.4
          - php: '8.4'
            laravel: '10.*'
            testbench: '8.*'
            stability: prefer-stable

          # Laravel 11 - PHP 8.4
          - php: '8.4'
            laravel: '11.*'
            testbench: '9.*'
            stability: prefer-stable

          # Laravel 12 - PHP 8.4
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            stability: prefer-stable

          # Laravel 13 - PHP 8.3
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
            stability: prefer-stable

          # Laravel 13 - PHP 8.4
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'
            stability: prefer-stable

          # Laravel 11 - PHP 8.5
          - php: '8.5'
            laravel: '11.*'
            testbench: '9.*'
            stability: prefer-stable

          # Laravel 12 - PHP 8.5
          - php: '8.5'
            laravel: '12.*'
            testbench: '10.*'
            stability: prefer-stable

          # Laravel 13 - PHP 8.5
          - php: '8.5'
            laravel: '13.*'
            testbench: '11.*'
            stability: prefer-stable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start NATS servers
        run: bash .github/scripts/start-nats-ci.sh

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, sockets, pcntl
          coverage: none
          ini-values: memory_limit=512M

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        env:
          COMPOSER_NO_SECURITY_BLOCKING: 1
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Wait for NATS servers
        run: bash .github/scripts/wait-for-nats-ci.sh

      - name: Run tests
        run: vendor/bin/pest
        env:
          NATS_HOST: localhost
          NATS_PORT: 4222
