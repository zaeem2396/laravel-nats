# ============================================================================
# LARAVEL NATS - COVERAGE WORKFLOW
# ============================================================================
#
# Runs Pest with PCOV on a single representative stack and uploads Clover XML.
# ============================================================================

name: Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Pest coverage (PHP 8.3 / Laravel 12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, sockets, pcntl, pcov
          coverage: pcov
          ini-values: memory_limit=512M

      - name: Install dependencies
        env:
          COMPOSER_NO_SECURITY_BLOCKING: 1
        run: |
          composer require "laravel/framework:12.*" "orchestra/testbench:10.*" --dev --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run Pest with coverage
        run: vendor/bin/pest --coverage --coverage-clover=build/coverage.xml --min=85

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: build/coverage.xml
          if-no-files-found: error
