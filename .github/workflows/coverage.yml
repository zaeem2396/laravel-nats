# ============================================================================
# LARAVEL NATS - COVERAGE WORKFLOW
# ============================================================================
#
# Runs Pest with PCOV on a single representative stack with live NATS
# (same containers as the test matrix) so integration tests are not skipped.
# ============================================================================

name: Coverage

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Pest coverage (PHP 8.3 / Laravel 12)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start NATS servers
        run: bash .github/scripts/start-nats-ci.sh

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, sockets, pcntl, pcov
          coverage: pcov
          ini-values: memory_limit=512M

      - name: Install dependencies
        env:
          COMPOSER_NO_SECURITY_BLOCKING: 1
        run: |
          composer require "laravel/framework:12.*" "orchestra/testbench:10.*" --dev --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Wait for NATS servers
        run: bash .github/scripts/wait-for-nats-ci.sh

      - name: Run Pest with coverage
        env:
          NATS_HOST: localhost
          NATS_PORT: 4222
        run: |
          mkdir -p build
          vendor/bin/pest --coverage --coverage-clover=build/coverage.xml --min=80

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: build/coverage.xml
          if-no-files-found: error
